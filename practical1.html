<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Community Learning Hub - Responsive Home</title>
<link rel="stylesheet" href="style.css">
<style>
body {
font-family: Arial, sans-serif;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
margin: 0;
background-color: #f0f0f0;
}
.container {
width: 80%;
padding: 20px;
background-color: #fff;
box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
}
h1 {
color: #1e3a8a;
}
@media (max-width: 768px) {
.container {
width: 90%;
}
h1 {
font-size: 24px;
}
}
@media (max-width: 480px) {
.container {
width: 100%;
padding: 10px;
}
h1 {
font-size: 18px;
}
}
</style>
</head>
<body>
<div class="container">
<h1>Community Learning Hub - Responsive Home</h1>
<p>This page adjusts its layout based on the screen size.</p>
</div>
</body>
</html>
